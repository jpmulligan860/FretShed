name: FretShed
options:
  bundleIdPrefix: com.jpm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  swift: "6.0"

packages:
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

schemes:
  FretShed:
    build:
      targets:
        FretShed: all
        FretShedTests: [test]
    run:
      config: Debug
      storeKitConfiguration: FretShed.storekit
    test:
      config: Debug
      targets:
        - FretShedTests

targets:
  FretShed:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - package: TelemetryDeck
    sources:
      - path: FretShed
    configFiles:
      Debug: Local.xcconfig
      Release: Local.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jpm.fretshed
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "FretShed uses the microphone to detect the notes you play on your guitar."
    info:
      path: FretShed/Resources/Info.plist
      properties:
        CFBundleDisplayName: FretShed
        NSMicrophoneUsageDescription: "FretShed uses the microphone to detect the notes you play on your guitar."
        UILaunchStoryboardName: LaunchScreen
        UIRequiresFullScreen: true
        UIAppFonts:
          - Montserrat-Black.ttf
          - Montserrat-ExtraBold.ttf
          - Montserrat-Bold.ttf
          - Montserrat-SemiBold.ttf
          - Montserrat-Medium.ttf
          - CrimsonPro-Italic.ttf
          - CrimsonPro-Regular.ttf
          - JetBrainsMono-Bold.ttf
          - JetBrainsMono-SemiBold.ttf
          - JetBrainsMono-Medium.ttf

  FretShedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FretShedTests
    dependencies:
      - target: FretShed
    settings:
      base:
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
