name: FretShed
options:
  bundleIdPrefix: com.jpm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  swift: "6.0"

targets:
  FretShed:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FretShed
      - NotificationScheduler.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jpm.fretshed
        SWIFT_VERSION: 6.0
        SWIFT_STRICT_CONCURRENCY: complete
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "FretShed uses the microphone to detect the notes you play on your guitar."
    info:
      path: FretShed/Resources/Info.plist
      properties:
        CFBundleDisplayName: FretShed
        NSMicrophoneUsageDescription: "FretShed uses the microphone to detect the notes you play on your guitar."
        UILaunchScreen: {}
        UIRequiresFullScreen: true

  FretShedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - FretShedTests
    dependencies:
      - target: FretShed
    settings:
      base:
        SWIFT_VERSION: 6.0
        GENERATE_INFOPLIST_FILE: YES
